services:

  mongodb:
    image: mongo:8
    

    restart: always

    

    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend

    

    ports:
      - "5001:5001"

    env_file:
      - ./backend/.env.docker

    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend

    

    ports:
      - "3000:3000"

    stdin_open: true

    tty: true

    depends_on:
      - backend

volumes:
  mongo-data: